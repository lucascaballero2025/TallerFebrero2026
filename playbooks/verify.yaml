---
- name: Verificación automática de infraestructura
  hosts: linux
  become: true
  tasks:
    
    - name: "Verificar que el login de root por SSH esté deshabilitado"
      ansible.builtin.command: grep "^PermitRootLogin no" /etc/ssh/sshd_config
      register: ssh_check
      failed_when: ssh_check.rc != 0
      changed_when: false

    
    - name: "Verificar que NFS Server esté activo"
      ansible.builtin.systemd:
        name: nfs-server
      register: nfs_service
      when: "'fileserver' in group_names"
      failed_when: nfs_service.status.ActiveState != "active"

    
    - name: "Forzar acceso al montaje y verificar NFS"
      ansible.builtin.shell: |
        ls /mnt/shared
        mount | grep nfs4
      register: mount_check
      when: "'ubuntu' in group_names"
      failed_when: mount_check.rc != 0
      changed_when: false

   
    - name: "Verificar respuesta del servidor HTTP (Puerto 8080)"
      ansible.builtin.uri:
        url: http://localhost:8080/README-NFS.txt
        return_content: yes
      register: web_check
      when: "'ubuntu' in group_names"
      failed_when: web_check.status != 200 or "Archivo de prueba de NFS" not in web_check.content

    - name: Mostrar resultado final
      ansible.builtin.debug:
        msg: "los test pasaron correctamente con exito {{ inventory_hostname }}!"
